<button (click)="mostrar = !mostrar">Toggle</button>

@if (mostrar) {
  <h1>Angular is amazing</h1>
}@else {
  <h2>I'm Rich!</h2>
}

<h1>{{ mensagem }}</h1>

<input [(ngModel)]="nome" (ngModelChange)="atualizaMensagem()" placeholder="Type your name">
<input [(ngModel)]="cidade" (ngModelChange)="atualizaMensagem()" placeholder="Type your city">
<input type="number" [(ngModel)]="idade" (ngModelChange)="atualizaMensagem()" placeholder="Type your age">

<h3>Bom dia {{ nome }}</h3>
<h2>Hello, {{ nome }}</h2>
<h2>Idade: {{ idade }}</h2>
<p>In 5 years: {{ idade + 5 }} old</p>
<h2>Cidade: {{ cidade }}</h2>

<mat-card style="text-align: center; margin: 40px; padding: 30px;">
  <h1>{{ contador }}</h1>

  <button mat-raised-button color="primary" (click)="somar()"> + </button>
  <button mat-raised-button color="accent" (click)="diminuir()"> - </button>
  <button mat-raised-button color="warn" (click)="zerar()"> Zerar </button>
  <button mat-raised-button color="primary" (click)="dobrar()"> x2 </button>
  <button (click)="somarCinco()">Somar + 5</button>
</mat-card>

<img [src]="imagem" width="600">

<button [disabled]="off">Salvar</button>

<p [style.color]="cor">Desenvolvedor de sistemas</p>
